bot:
  id: ""
  appId: ""
  token: ""
  secret: ""
  botUid: ""
  public: false
  debug: false
  shadow: false
  shard: [0, 1]
  # 顶层 + 容器内层 ContactList 的有界缓存阈值.
  # maximumSize 触发 Caffeine size-based eviction (window TinyLFU, 非严格 LRU);
  # expireAfterAccessSeconds 触发空闲过期, entry 在该秒数内未被访问即可被淘汰.
  # 淘汰回调会 cancel 被驱逐 contact 自己的 SupervisorJob (借用父 scope 的 leaf member 不受影响),
  # 进而连锁 cancel 它的 inner ContactList 内所有协程子任务. inner ContactList (Guild/Group/Channel
  # 内嵌的 members/channels) 同样走有界缓存, 跟随 outer 容器一并被 GC; GROUP_MESSAGE_CREATE (群全量
  # 消息) 开启后 author 基数显著放大, 因此 inner 不再使用无界 ConcurrentHashMap.
  # 默认值按 6w DAU 量级估算; 调小会让缓存命中率下降, 调大会增加 heap 占用. 整段可省略, 不写时按下面默认值生效.
  contactCache:
    # 频道一般每 bot 几十~几百个; 1k + 7d 给大量余量.
    guilds:
      maximumSize: 1000
      expireAfterAccessSeconds: 604800   # 7d
    # 群上限以"机器人加入的群"为基数; 6w DAU 业务多在数千群级别.
    groups:
      maximumSize: 10000
      expireAfterAccessSeconds: 86400    # 24h
    # 好友/C2C 用户基数最大, miss 频率最高; 上限设到 DAU 量级以上.
    friends:
      maximumSize: 100000
      expireAfterAccessSeconds: 86400    # 24h
    # 单 guild 成员: 仅缓存近期活跃 + 启动初始化触达成员.
    guildMembers:
      maximumSize: 5000
      expireAfterAccessSeconds: 7200     # 2h
    # 单 guild 子频道: 数量小且结构稳定, 保留时间长于成员.
    guildChannels:
      maximumSize: 500
      expireAfterAccessSeconds: 604800   # 7d
    # 单 channel 活跃成员.
    channelMembers:
      maximumSize: 2000
      expireAfterAccessSeconds: 7200     # 2h
    # 单 group 活跃成员: GROUP_MESSAGE_CREATE 下 author 基数接近全群发言用户.
    groupMembers:
      maximumSize: 3000
      expireAfterAccessSeconds: 7200     # 2h
adminToken: ""
redis:
  host: "127.0.0.1"
  port: 6379
  db: 0
mariadb:
  host: "127.0.0.1:3306"
  db: "arona"
  user: "arona"
  password: ""
mongodb:
  host: ""
  port: 27017
  user: ""
  password: ""
  db: ""
web:
  port: 12355
  # CORS 白名单 host (不带 scheme), 例如 ["arona.example.com"]. 留空表示允许任意 host (仅开发期使用).
  allowedOrigins: []
  # 仅在确实部署在 nginx 等反向代理之后时设为 true, 否则 X-Forwarded-* / X-Real-IP 会被任意伪造.
  behindProxy: false
superAdminUid: []
debug: false
